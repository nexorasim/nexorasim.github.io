    <style>
      html {
        scroll-behavior: smooth;
      }
      body {
        font-family: 'Manrope', sans-serif;
      }
      .font-sora {
        font-family: 'Sora', sans-serif;
      }
      .globe-container {
        perspective: 1000px;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .globe {
        width: 400px;
        height: 400px;
        border-radius: 50%;
        background: radial-gradient(circle at 30% 30%, #7BD5FB, #181818 80%);
        position: relative;
        transform-style: preserve-3d;
        animation: rotate-globe 30s linear infinite;
        box-shadow: 0 0 50px rgba(123, 213, 251, 0.3), inset 0 0 40px rgba(123, 213, 251, 0.2);
        border: 1px solid rgba(123, 213, 251, 0.4);
      }
      
      .globe::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        border-radius: 50%;
        background-image:
            repeating-linear-gradient(90deg, transparent, transparent 49.8%, rgba(123, 213, 251, 0.15) 50%, rgba(123, 213, 251, 0.15) 50.2%, transparent 50.2%, transparent),
            repeating-linear-gradient(0deg, transparent, transparent 49.8%, rgba(123, 213, 251, 0.15) 50%, rgba(123, 213, 251, 0.15) 50.2%, transparent 50.2%, transparent);
        background-size: 100% 12.5%, 12.5% 100%;
      }

      @keyframes rotate-globe {
        0% { transform: rotateY(0deg) rotateX(10deg); }
        100% { transform: rotateY(360deg) rotateX(10deg); }
      }

      @keyframes fade-in {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in {
        animation: fade-in 0.5s ease-out forwards;
      }
    </style>
