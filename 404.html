<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NexoraSIM Entertainment Server</title>
  <script>
    // GitHub Pages SPA fallback
    // Redirect all 404s to index.html with path info
    const path = window.location.pathname.slice(1);
    if (path) {
      window.history.replaceState(null, null, '/#/' + path + window.location.search + window.location.hash);
    }
    window.location.replace('/');
  </script>
</head>
<body>
  <div style="text-align: center; padding: 50px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">
    <h1>Redirecting to NexoraSIM...</h1>
    <p>If you are not redirected automatically, <a href="/">click here</a>.</p>
  </div>
</body>
</html>
