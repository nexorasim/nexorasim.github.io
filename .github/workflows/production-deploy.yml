name: NexoraSIM Production Deployment

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Quality Assurance Job
  quality-check:
    runs-on: ubuntu-latest
    name: Quality Assurance
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Setup Node.js 18
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install Dependencies
      run: npm ci
      
    - name: Validate Microsoft Stack
      run: npm run validate
      
    - name: Lint Code
      run: |
        npx eslint src/ --ext .js,.jsx,.ts,.tsx --max-warnings 0
        
    - name: Type Check
      run: npx tsc --noEmit
      
    - name: Security Audit
      run: npm audit --audit-level moderate
      
    - name: Check for Emoji (Zero Emoji Policy)
      run: |
        if grep -r "[\u{1F600}-\u{1F64F}\u{1F300}-\u{1F5FF}\u{1F680}-\u{1F6FF}\u{1F1E0}-\u{1F1FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]" src/ docs/ README.md; then
          echo "ERROR: Emoji characters found. NexoraSIM enforces zero emoji policy."
          exit 1
        fi
        
    - name: Validate Routes
      run: node scripts/validate-routes.js
      
    - name: Performance Budget Check
      run: |
        npm run build
        BUNDLE_SIZE=$(du -sb dist | cut -f1)
        MAX_SIZE=3145728  # 3MB limit
        if [ $BUNDLE_SIZE -gt $MAX_SIZE ]; then
          echo "ERROR: Bundle size $BUNDLE_SIZE exceeds limit $MAX_SIZE"
          exit 1
        fi

  # Build and Test Job
  build-test:
    runs-on: ubuntu-latest
    needs: quality-check
    name: Build & Test
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Setup Node.js 18
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install Dependencies
      run: npm ci
      
    - name: Build Production Bundle
      run: npm run build
      env:
        NODE_ENV: production
        
    - name: Test Build Output
      run: |
        # Verify critical files exist
        test -f dist/index.html
        test -d dist/assets
        
        # Verify no broken links in build
        npx broken-link-checker http://localhost:3000 --recursive --ordered || true
        
    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: production-build
        path: dist/
        retention-days: 1

  # Accessibility & SEO Testing
  accessibility-seo:
    runs-on: ubuntu-latest
    needs: build-test
    name: Accessibility & SEO
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Download Build Artifacts
      uses: actions/download-artifact@v4
      with:
        name: production-build
        path: dist/
        
    - name: Setup Node.js 18
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Install Testing Tools
      run: |
        npm install -g @lhci/cli lighthouse
        
    - name: Serve Built Site
      run: |
        npx serve -s dist -p 3000 &
        sleep 5
        
    - name: Lighthouse CI
      run: |
        lhci autorun --config=.lighthouserc.json || true
        
    - name: Accessibility Test
      run: |
        npx axe-cli http://localhost:3000 --exit || true

  # Security Scanning
  security-scan:
    runs-on: ubuntu-latest
    needs: quality-check
    name: Security Scan
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Run Trivy Vulnerability Scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
        
    - name: Upload Trivy Results
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

  # Production Deployment
  deploy:
    runs-on: ubuntu-latest
    needs: [quality-check, build-test, accessibility-seo, security-scan]
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
      
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Setup Node.js 18
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install Dependencies
      run: npm ci
      
    - name: Build Production Site
      run: npm run build
      env:
        NODE_ENV: production
        
    - name: Setup GitHub Pages
      uses: actions/configure-pages@v4
      
    - name: Upload to GitHub Pages
      uses: actions/upload-pages-artifact@v3
      with:
        path: dist/
        
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
      
    - name: Verify Deployment
      run: |
        sleep 30
        curl -f ${{ steps.deployment.outputs.page_url }} || exit 1
        
    - name: Post-Deployment Health Check
      run: |
        # Verify critical pages
        curl -f ${{ steps.deployment.outputs.page_url }}/features || exit 1
        curl -f ${{ steps.deployment.outputs.page_url }}/api || exit 1
        curl -f ${{ steps.deployment.outputs.page_url }}/enterprise || exit 1
        
  # Post-Deployment Monitoring
  post-deploy-monitor:
    runs-on: ubuntu-latest
    needs: deploy
    name: Post-Deployment Monitoring
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Performance Monitoring
      run: |
        # Run Lighthouse performance test on live site
        npx lighthouse https://nexorasim.github.io --only-categories=performance --chrome-flags="--headless" --output=json --output-path=./performance-report.json
        
        # Extract performance score
        PERF_SCORE=$(cat performance-report.json | jq '.categories.performance.score * 100')
        echo "Performance Score: $PERF_SCORE"
        
        # Fail if performance score is below 90
        if (( $(echo "$PERF_SCORE < 90" | bc -l) )); then
          echo "ERROR: Performance score $PERF_SCORE is below threshold (90)"
          exit 1
        fi
        
    - name: Uptime Check
      run: |
        # Verify site is accessible
        curl -f https://nexorasim.github.io
        curl -f https://nexorasim.github.io/features
        curl -f https://nexorasim.github.io/api
        
    - name: SEO Validation
      run: |
        # Check for essential SEO elements
        curl -s https://nexorasim.github.io | grep -q "<title>" || exit 1
        curl -s https://nexorasim.github.io | grep -q "meta.*description" || exit 1
        curl -s https://nexorasim.github.io | grep -q "meta.*og:title" || exit 1