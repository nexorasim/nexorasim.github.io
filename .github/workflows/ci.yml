name: CI Build, Test, and Deploy

on:
  push:
    branches: [ main, master ]
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: No-emoji commit messages
        run: |
          node -e "const msg=process.env.GITHUB_EVENT_HEAD_COMMIT_MESSAGE||'';const r=/[\p{Emoji}]/u;if(r.test(msg)){console.error('Emoji detected in commit message.');process.exit(1)}" || true
        env:
          GITHUB_EVENT_HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message || '' }}

      - name: Lint
        run: npm run lint

      - name: Type Check
        run: npm run type-check

      - name: Validate Routes
        run: npm run validate:routes

      - name: Build
        run: npm run build

      - name: Serve built site for local checks
        run: npx serve -s dist -l 4173 &

      - name: Accessibility check (axe)
        run: npx axe http://localhost:4173 --exit 0

      - name: Broken link check
        run: npx blc http://localhost:4173 -ro --exclude-external --filter-level 3 || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    needs: build-test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
